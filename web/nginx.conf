server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API проксируем на FastAPI-бэкенд (контейнер admin)
    location /api/ {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # загрузка картинки идёт base64 в JSON — поднимаем лимит тела запроса
        client_max_body_size 16m;

        # ручной сбор теперь асинхронный, но веб-поиск (LLM+SearXNG) всё ещё
        # синхронный и может идти долго — поднимаем таймауты, чтобы не ловить 504
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA: всё остальное отдаём index.html
    location / {
        try_files $uri /index.html;
    }
}
