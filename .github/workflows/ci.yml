# Положить в .github/workflows/ci.yml
# Бесплатно: публичные репозитории — без лимита минут; приватные — месячная бесплатная квота.

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write          # для пуша образа в GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # Собираем под целевую платформу деплоя (Windows-ПК = amd64)
      - name: Build app image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64
          push: false
          tags: ghcr.io/${{ github.repository }}/app:ci

      # Пуш в GHCR только по тегу vX.Y.Z
      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push tagged image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/app:${{ github.ref_name }}
