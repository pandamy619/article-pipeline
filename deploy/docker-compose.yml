# Прод-конфиг (Windows + GPU). Запуск:  docker compose --profile gpu up -d
# Разработка на Mac (Ollama нативная, контейнер ollama НЕ нужен):
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml up -d postgres valkey searxng app
# Проверка GPU: docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi

services:
  # Локальный LLM-движок с GPU. Только на проде (профиль gpu); на Mac Ollama нативная.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["gpu"]
    ports: ["11434:11434"]
    volumes: [ollama:/root/.ollama]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # Разовая загрузка моделей при первом запуске (профиль gpu)
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["gpu"]
    depends_on: [ollama]
    environment: ["OLLAMA_HOST=ollama:11434"]
    entrypoint: ["sh", "-c", "sleep 5 && ollama pull qwen3:14b && ollama pull bge-m3"]
    restart: "no"

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8        # открытый (BSD) форк Redis, протокол-совместим
    container_name: valkey
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports: ["8080:8080"]
    volumes: ["./searxng:/etc/searxng"]
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}     # подставляется в settings.yml при старте
    restart: unless-stopped

  # Основной сервис: сборщик + фильтр + рерайт + бот (aiogram)
  app:
    build: ../app
    container_name: app
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      searxng:
        condition: service_started
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://valkey:6379/0
      - SEARXNG_URL=http://searxng:8080
      - LLM_MODEL=qwen3:14b
      - EMBED_MODEL=bge-m3
    volumes:
      - ../app:/app
      - ../sessions:/app/sessions   # .session Telethon
    restart: unless-stopped

  # Веб-админка: просмотр статей и ручной отбор (http://localhost:8000)
  admin:
    build: ../app
    container_name: admin
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://valkey:6379/0
      - SEARXNG_URL=http://searxng:8080
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=qwen3:14b
      - EMBED_MODEL=bge-m3
    command: ["uvicorn", "src.admin.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports: ["8000:8000"]
    volumes:
      - ../app:/app
    restart: unless-stopped

  # Опционально: оркестрация (docker compose --profile orchestration up -d)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    profiles: ["orchestration"]
    ports: ["5678:5678"]
    volumes: [n8ndata:/home/node/.n8n]
    restart: unless-stopped

volumes:
  ollama:
  pgdata:
  n8ndata:
