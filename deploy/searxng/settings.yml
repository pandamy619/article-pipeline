# Минимальная конфигурация SearXNG для пайплайна.
use_default_settings: true

server:
  secret_key: "ultrasecretkey"   # подставляется из SEARXNG_SECRET (.env) при старте контейнера
  limiter: false

search:
  formats:
    - html
    - json                       # нужно, чтобы пайплайн получал результаты в JSON
